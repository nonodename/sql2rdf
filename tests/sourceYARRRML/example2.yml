prefixes:
  ex: http://example.com/ns#

mappings:
  department:
    sources:
      - query: "SELECT DEPTNO, DNAME, LOC, (SELECT COUNT(*) FROM EMP WHERE DEPTNO=DEPT.DEPTNO) AS STAFF FROM DEPT"
    s: http://data.example.com/department/$(DEPTNO)
    po:
      - [a, ex:Department]
      - [ex:name, $(DNAME)]
      - [ex:location, $(LOC)]
      - [ex:staff, $(STAFF)]
