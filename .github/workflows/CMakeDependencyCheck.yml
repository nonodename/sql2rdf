name: Dependency Check
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dmnq-f/cmake-depcheck@v3
        with:
          path: CMakeLists.txt
          create-prs: true 
